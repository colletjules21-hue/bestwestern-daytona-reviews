name: Weekly Reviews Pipeline

# Déclencheurs :
#  - tous les lundis à 08:00 UTC (cron)
#  - manuel depuis l'onglet Actions (workflow_dispatch)
#  - à chaque push d'un nouveau JSON dans data/raw/
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "data/raw/**"

permissions:
  contents: write   # pour committer les artefacts générés (outputs/, data/processed/)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (push to Notion)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python main.py --notion

      - name: Commit artifacts back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly pipeline artifacts [skip ci]"
            git push
          fi
